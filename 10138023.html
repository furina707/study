<script type="text/javascript">
	function GetQueryString(name)
	{
	     var reg = new RegExp("(^|&)"+ name +"=([^&]*)(&|$)");
	     var r = location.search.substr(1).match(reg);
	     if(r!=null)return  unescape(r[2]); return null;
	}
	 var getIOSVersion = function(){
    	var ua = navigator.userAgent.toLowerCase();
		if(ua.match(/(iphone|ipod);?/i)){
			return ua.match(/iphone os ([0-9]+)_/)[1];
		}else if(ua.match(/(ipad);?/i)){
			return (ua.match(/cpu os ([0-9]+)_/))[1];
		}
	}
	 function isWeiXin() { 
		 var ua = window.navigator.userAgent.toLowerCase(); 
		 if (ua.match(/MicroMessenger/i) == 'micromessenger') { 
		 	return true; 
		 } else { 
		 	return false; 
		 } 
	} 
	function openDownURL() {		
		var name = "PPT上课";
		var inviteCode = GetQueryString("inviteCode");
		var classId = $("#classId").val();
		var enc = $("#enc").val();
		var timeStamp =  $("#timeStamp").val();
		var resourceUrl = location.origin + _CP_ + "/teachingClassPhoneManage/phone/toParticipateCls?inviteCode=" + inviteCode + "&classId="+classId+"&enc="+enc+"&timeStamp="+timeStamp;
		var appScheme = "chaoxingshareback://url=" + resourceUrl + "&title=" + name + "&sharebacktype=7";
		var tipUrl = ServerHost.ztDomain + "/special/course/tips?apptag=1000&appScheme=" + encodeURIComponent(appScheme);
		//如果是ios
		var ua = navigator.userAgent.toLowerCase();
		if (ua.match(/(iphone|ipod|ipad);?/i)) {
			//如果版本大于等于IOS9
			var iosVersion = getIOSVersion();
			if (iosVersion >= 9) {
                var productid = "1000";
                                    productid="1000";
                                tipUrl = 'http://share1.chaoxing.com/share/'+productid+'/tips?sharebacktype=7&appScheme=' + encodeURIComponent(appScheme) + '&title=' + name +'&apptag=1000&url=' + encodeURIComponent(resourceUrl);
			}
		}
		document.location.href = tipUrl;
	}
